name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      # Test step placeholder — add `npm test` here once Vitest is wired up
      # - name: Test
      #   run: npm test

      - name: Build
        run: npm run build
